name: CI Docker - TP DevOps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-docker-image:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    - name: Installer JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Exécuter les tests unitaires et MockMvc
      run: chmod +x ./gradlew && ./gradlew test

    - name: Tester la construction de l'image Docker
      run: docker build -t test-image .
